<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DishDiscovery - South Indian Recipe Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7',
                        terracotta: '#E2725B',
                        charcoal: '#2C3539',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cream text-charcoal min-h-screen font-sans">

    <header class="border-b border-gray-200 bg-white sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🍲</span>
                <h1 class="text-xl font-bold tracking-tight">DishDiscovery</h1>
            </div>
            <span class="text-xs bg-orange-100 text-orange-800 font-semibold px-3 py-1 rounded-full">South Indian Cuisine</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="text-center max-w-2xl mx-auto mb-12">
            <h2 class="text-3xl font-extrabold mb-3">What ingredients do you have?</h2>
            <p class="text-gray-500 mb-6 text-sm">
                Enter ingredients available in your kitchen (e.g., <span class="italic font-medium text-gray-700">urad dal, rice, tomato, coconut, toor dal</span>)
            </p>
            
            <div class="flex flex-col sm:flex-row gap-3 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
                <input 
                    id="ingredientInput"
                    type="text" 
                    placeholder="e.g., urad dal, coconut, tomato" 
                    class="flex-1 px-4 py-3 outline-none text-charcoal rounded-lg text-sm"
                />
                <button onclick="findRecipes()" class="bg-terracotta text-white font-medium px-6 py-3 rounded-lg hover:bg-opacity-95 transition">
                    Search Recipes
                </button>
            </div>
        </section>

        <section>
            <h3 class="text-lg font-bold mb-6 border-b border-gray-100 pb-2" id="resultsTitle">Available Recipes</h3>
            <div id="recipeGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <footer class="text-center text-xs text-gray-400 py-8 border-t border-gray-100 mt-12">
        <p>&copy; 2026 DishDiscovery. Handcrafted with care.</p>
    </footer>

    <script>
        const recipeDatabase = [
            {
                name: "Medu Vada (Urad Dal Vada)",
                emoji: "🍩",
                description: "Crispy, golden, and fluffy donut-shaped fritters made with black gram lentils.",
                ingredients: ["urad dal", "green chili", "ginger", "curry leaves"],
                time: "30 mins",
                difficulty: "Medium"
            },
            {
                name: "Classic Idli",
                emoji: "⚪",
                description: "Soft, fluffy steamed rice cakes prepared from fermented rice and lentil batter.",
                ingredients: ["rice", "urad dal"],
                time: "20 mins",
                difficulty: "Easy"
            },
            {
                name: "Onion Uttapam",
                emoji: "🥞",
                description: "Thick savory pancakes cooked with seasoned onions, green chilies, and fresh herbs.",
                ingredients: ["rice", "urad dal", "onion", "green chili"],
                time: "15 mins",
                difficulty: "Easy"
            },
            {
                name: "Masala Dosa",
                emoji: "🌯",
                description: "Thin, crispy rice crepes filled with a deliciously spiced potato masala.",
                ingredients: ["rice", "urad dal", "potato", "onion"],
                time: "25 mins",
                difficulty: "Medium"
            },
            {
                name: "Hotel Style Sambar",
                emoji: "🥣",
                description: "A flavorful, aromatic lentil stew cooked with tamarind paste and mixed vegetables.",
                ingredients: ["toor dal", "tamarind", "tomato", "onion"],
                time: "35 mins",
                difficulty: "Medium"
            },
            {
                name: "Fresh Coconut Chutney",
                emoji: "🥥",
                description: "A classic, creamy condiment made with fresh coconut, roasted gram, and mild spices.",
                ingredients: ["coconut", "green chili", "mustard seeds"],
                time: "5 mins",
                difficulty: "Easy"
            },
            {
                name: "Thakkali Sadam (Tomato Rice)",
                emoji: "🍚",
                description: "A tangy, spicy one-pot rice preparation loaded with tomatoes and fragrant spices.",
                ingredients: ["rice", "tomato", "onion", "ginger"],
                time: "20 mins",
                difficulty: "Easy"
            },
            {
                name: "Ginger Thogayal",
                emoji: "🥣",
                description: "A traditional thick, tangy lentil and ginger chutney perfect for pairing with rice.",
                ingredients: ["ginger", "urad dal", "tamarind", "red chili"],
                time: "10 mins",
                difficulty: "Easy"
            }
        ];

        function displayRecipes(recipesToShow) {
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = ""; 

            if(recipesToShow.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-12">No recipes perfectly match those ingredients. Try adding 'urad dal', 'coconut', or 'rice'!</div>`;
                return;
            }

            recipesToShow.forEach(recipe => {
                const cardHTML = `
                    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden hover:shadow-md transition">
                        <div class="h-40 bg-orange-50/50 flex items-center justify-center text-5xl">${recipe.emoji}</div>
                        <div class="p-5">
                            <h4 class="font-bold text-base text-charcoal mb-1">${recipe.name}</h4>
                            <p class="text-xs text-gray-500 mb-4 line-clamp-2">${recipe.description}</p>
                            <div class="mb-4">
                                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Ingredients:</span>
                                <div class="flex flex-wrap gap-1">
                                    ${recipe.ingredients.map(ing => `<span class="bg-gray-100 text-gray-600 text-[11px] px-2 py-0.5 rounded">${ing}</span>`).join('')}
                                </div>
                            </div>
                            <div class="flex justify-between text-xs font-medium text-gray-400 pt-2 border-t border-gray-100">
                                <span>⏱️ ${recipe.time}</span>
                                <span>🍳 ${recipe.difficulty}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        function findRecipes() {
            const userInput = document.getElementById('ingredientInput').value.toLowerCase();
            const userIngredients = userInput.split(',').map(item => item.trim()).filter(item => item !== "");

            if (userIngredients.length === 0) {
                document.getElementById('resultsTitle').innerText = "Available Recipes";
                displayRecipes(recipeDatabase);
                return;
            }

            const matchedRecipes = recipeDatabase.filter(recipe => {
                return recipe.ingredients.some(requiredIng => userIngredients.includes(requiredIng));
            });

            document.getElementById('resultsTitle').innerText = `Matched Results (${matchedRecipes.length})`;
            displayRecipes(matchedRecipes);
        }

        // Initialize page
        displayRecipes(recipeDatabase);
    </script>
</body>
</html>
